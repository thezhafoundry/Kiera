services:
  - type: web
    name: keira-backend
    runtime: python
    region: singapore       # colocated with the Modal `ap-southeast` GPU worker pin
    plan: free              # free tier (512MB RAM, sleeps after 15min idle)
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LIVEKIT_URL
        sync: false         # set manually in Render dashboard
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: RVC_ENDPOINT_URL
        sync: false
      - key: RVC_API_KEY
        sync: false         # must match the Modal rvc-api-key secret
      - key: KEIRA_CONTROL_TOKEN
        sync: false         # bearer token for operator/dashboard control routes
      - key: RVC_PITCH_SHIFT
        sync: false         # fallback semitones; dashboard selects male/female per call
      - key: RVC_INDEX_RATE
        sync: false         # defaults to 0.9 if unset
      - key: RVC_WS_URL
        sync: false         # optional explicit override; derived from RVC_ENDPOINT_URL if unset
      - key: RVC_KEEPWARM
        sync: false         # read at startup; changing Render env restarts the service
      - key: CORS_ORIGINS
        sync: false         # comma-separated allowed origins; defaults to "*" if unset
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_SIP_URI
        sync: false         # Twilio Elastic SIP Trunk termination URI (e.g. myproject.pstn.twilio.com)
      - key: TWILIO_SIP_TRUNK_ID
        sync: false         # LiveKit outbound trunk ID — populate after running POST /api/setup
      - key: TWILIO_SIP_USERNAME
        sync: false         # defaults to "Keira" if unset
      - key: TWILIO_SIP_PASSWORD
        sync: false
      - key: SERVER_URL
        sync: false         # public URL of this server (e.g. https://keira-backend.onrender.com)
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: LLVC_PILOT_ENABLED
        sync: false
      - key: LLVC_ENDPOINT_URL
        sync: false
      - key: LLVC_WS_URL
        sync: false
      - key: LLVC_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"          # show print() logs in real time
